name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STUDY_CHANGED_FROM: ${{ github.event.before }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use repository npm version
        run: npm install --global "$(node -p "require('./package.json').packageManager")"
      - run: node scripts/audit-toolchain.mjs
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Set runtime verification environment
        run: |
          echo "STUDY_BUILD_LOG=$RUNNER_TEMP/study-build.log" >> "$GITHUB_ENV"
          echo "STUDY_FRESHNESS_AS_OF=$(date -u +%F)" >> "$GITHUB_ENV"
      - run: npm run verify:ci
      - name: Create sanitized diagnostics
        if: always()
        run: node scripts/build-diagnostics.mjs --log "$STUDY_BUILD_LOG" --dist dist --out "$RUNNER_TEMP/study-diagnostics.json"
      - name: Upload sanitized diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: study-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/study-diagnostics.json
          retention-days: 7
          if-no-files-found: error
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
