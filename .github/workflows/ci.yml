name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify:ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STUDY_CHANGED_FROM: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Set runtime verification environment
        run: |
          echo "STUDY_BUILD_LOG=$RUNNER_TEMP/study-build.log" >> "$GITHUB_ENV"
          echo "STUDY_FRESHNESS_AS_OF=$(date -u +%F)" >> "$GITHUB_ENV"
      - run: npm run verify:ci
      - name: Create sanitized diagnostics
        if: always()
        run: node scripts/build-diagnostics.mjs --log "$STUDY_BUILD_LOG" --dist dist --out "$RUNNER_TEMP/study-diagnostics.json"
      - name: Upload sanitized diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: study-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/study-diagnostics.json
          retention-days: 7
          if-no-files-found: error
