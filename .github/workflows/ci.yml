name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify:ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STUDY_CHANGED_FROM: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set runtime verification environment
        run: |
          echo "STUDY_BUILD_LOG=$RUNNER_TEMP/study-build.log" >> "$GITHUB_ENV"
          echo "STUDY_FRESHNESS_AS_OF=$(date -u +%F)" >> "$GITHUB_ENV"
      - run: npm run verify:ci
      - name: Create sanitized diagnostics
        if: always()
        run: node scripts/build-diagnostics.mjs --log "$STUDY_BUILD_LOG" --dist dist --out "$RUNNER_TEMP/study-diagnostics.json"
      - name: Upload sanitized diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: study-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/study-diagnostics.json
          retention-days: 7
          if-no-files-found: error
